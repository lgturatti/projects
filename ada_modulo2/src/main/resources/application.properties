security.jwt.secret=${JWT_SECRET:dev-local-jwt-secret-key-with-32-plus-chars-12345}

# DataSource (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/orderservice?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# External service base URLs
clients.customer.base-url=${CUSTOMER_SERVICE_URL:http://localhost:8081}
clients.catalog.base-url=${CATALOG_SERVICE_URL:http://localhost:8082}

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.customerService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.customerService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.customerService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.customerService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.customerService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.customerService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.customerService.automaticTransitionFromOpenToHalfOpenEnabled=true

resilience4j.circuitbreaker.instances.catalogService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.catalogService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.catalogService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.catalogService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.catalogService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.catalogService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.catalogService.automaticTransitionFromOpenToHalfOpenEnabled=true

# Actuator / Observability (management on dedicated port for security isolation)
management.server.port=8090
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# Additional external service URLs
clients.payment-gateway.base-url=${PAYMENT_GATEWAY_URL:http://localhost:8083}
clients.notification.base-url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

# Resilience4j Circuit Breaker — Payment Gateway
resilience4j.circuitbreaker.instances.paymentGateway.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.paymentGateway.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentGateway.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentGateway.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentGateway.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.paymentGateway.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.paymentGateway.automaticTransitionFromOpenToHalfOpenEnabled=true

# Distributed Tracing (Micrometer / OpenTelemetry)
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging.pattern.correlation=[%X{traceId:-},%X{spanId:-}]
